version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: shopwise-postgres
    environment:
      POSTGRES_DB: shopwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - shopwise_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shopwise-redis
    ports:
        - "6379:6379"
    volumes:
        - redis_data:/data

volumes:
  shopwise_data:
  redis_data:
