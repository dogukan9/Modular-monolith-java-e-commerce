version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: shopwise-postgres
    environment:
      POSTGRES_DB: shopwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - shopwise_data:/var/lib/postgresql/data

volumes:
  shopwise_data: