version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: shopwise-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yourdbname}
      POSTGRES_USER: ${POSTGRES_USER:-yourdbusername}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yourdbpassword}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - shopwise_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shopwise-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  shopwise_data:
  redis_data: